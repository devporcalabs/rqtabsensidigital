server
{
    listen 80;
    listen 443 ssl http2;
    server_name demo-absensi.porcalabs.com;
    index index.php index.html index.htm default.php default.htm default.html;
    root /www/wwwroot/demo-absensi.porcalabs.com;
    
    #SSL-START SSL related configuration, do not delete or modify the next line of comments
    #error_page 404/404.html;
    ssl_certificate    /www/server/panel/vhost/cert/demo-absensi.porcalabs.com/fullchain.pem;
    ssl_certificate_key    /www/server/panel/vhost/cert/demo-absensi.porcalabs.com/privkey.pem;
    ssl_protocols TLSv1.1 TLSv1.2 TLSv1.3;
    ssl_ciphers EECDH+CHACHA20:EECDH+CHACHA20-draft:EECDH+AES128:RSA+AES128:EECDH+AES256:RSA+AES256:EECDH+3DES:RSA+3DES:!MD5;
    ssl_prefer_server_ciphers on;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 10m;
    add_header Strict-Transport-Security "max-age=31536000";
    error_page 497  https://$host$request_uri;
    #SSL-END
    
    #ERROR-PAGE-START  Error page configuration, do not delete or modify the next line of comments
    #error_page 404 /404.html;
    #error_page 502 /502.html;
    #ERROR-PAGE-END
    
    #PHP-INFO-START  PHP sub-template, page configuration is shared, please modify code to/etc/nginx/php/82.conf
    include enable-php-82.conf;
    #PHP-INFO-END
    
    #REWRITE-START URL rewrite rule library, please modify the reference to config/nginx/rewrite/demo-absensi.porcalabs.com.conf
    #REWRITE-END
    
    # Remote access to the status page of the PHP-FPM
    location ~ ^/(phpfpm_status|phpfpm_ping)$ {
        access_log off;
        allow 127.0.0.1;
        deny all;
        include fastcgi_params;
        fastcgi_pass unix:/tmp/php-cgi-82.sock;
    }
    
    # Remote access to the status page of Nginx
    location /nginx_status {
        stub_status on;
        access_log off;
        allow 127.0.0.1;
        deny all;
    }

    # Forbidden files or directories
    location ~ ^/(\.user.ini|\.htaccess|\.git|\.env|\.svn|\.project|LICENSE|README.md)
    {
        return 404;
    }
    
    # Directory verification script
    location ~ \.well-known{
        allow all;
    }
    
    # Location of the location of the directory to be cached
    location ~ .*\.(gif|jpg|jpeg|png|bmp|swf)$
    {
        expires      30d;
        error_log /dev/null;
        access_log /dev/null;
    }
    
    # Location of the location of the directory to be cached
    location ~ .*\.(js|css)?$
    {
        expires      12h;
        error_log /dev/null;
        access_log /dev/null; 
    }
    
    access_log  /www/wwwlogs/demo-absensi.porcalabs.com.log;
    error_log  /www/wwwlogs/demo-absensi.porcalabs.com.error.log;
}
